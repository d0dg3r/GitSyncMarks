name: Add Bookmark

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Bookmark URL'
        required: true
        type: string
      title:
        description: 'Bookmark title (leave empty to use URL)'
        required: false
        type: string
        default: ''
      base-path:
        description: 'Base folder in repo (must match extension File Path setting)'
        required: false
        type: string
        default: 'bookmarks'
      folder:
        description: 'Root folder (toolbar or other)'
        required: false
        type: string
        default: 'toolbar'
      path:
        description: 'Optional subfolder within root (e.g. dev-tools for bookmarks/toolbar/dev-tools/)'
        required: false
        type: string
        default: ''

permissions:
  contents: write

jobs:
  add-bookmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download add-bookmark script
        run: |
          curl -fsSL -o /tmp/add-bookmark-to-repo.py \
            https://raw.githubusercontent.com/d0dg3r/GitSyncMarks/main/scripts/add-bookmark-to-repo.py

      - name: Add bookmark file
        env:
          INPUT_URL: ${{ inputs.url }}
          INPUT_TITLE: ${{ inputs.title }}
          INPUT_BASE_PATH: ${{ inputs.base-path }}
          INPUT_FOLDER: ${{ inputs.folder }}
          INPUT_PATH: ${{ inputs.path }}
        run: |
          python3 /tmp/add-bookmark-to-repo.py \
            --url "$INPUT_URL" \
            --title "$INPUT_TITLE" \
            --base-path "$INPUT_BASE_PATH" \
            --folder "$INPUT_FOLDER" \
            --path "$INPUT_PATH"

      - name: Commit and push
        env:
          INPUT_TITLE: ${{ inputs.title }}
          INPUT_URL: ${{ inputs.url }}
        run: |
          git config user.name "GitSyncMarks Bot"
          git config user.email "gitsyncmarks-bot@users.noreply.github.com"
          git add -A
          COMMIT_LABEL="${INPUT_TITLE:-$INPUT_URL}"
          git commit -m "Add bookmark: ${COMMIT_LABEL}"
          git push
